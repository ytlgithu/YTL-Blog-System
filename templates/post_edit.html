{% extends 'base.html' %}

{% block title %}{{ '编辑文章' if post else '写文章' }} - YTL 博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0">
                    <i class="bi bi-pencil-square me-2"></i>
                    {{ '编辑文章' if post else '写文章' }}
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('post_edit', post_id=post.id) if post else url_for('post_new') }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">文章标题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title" 
                               value="{{ post.title if post else '' }}" placeholder="请输入文章标题" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="category" class="form-label">分类</label>
                            <input type="text" class="form-control" id="category" name="category" 
                                   value="{{ post.category if post else '技术' }}" list="categoryList">
                            <datalist id="categoryList">
                                {% for cat in categories %}
                                    <option value="{{ cat }}">
                                {% endfor %}
                            </datalist>
                        </div>
                        <div class="col-md-6">
                            <label for="tags" class="form-label">标签</label>
                            <input type="text" class="form-control" id="tags" name="tags" 
                                   value="{{ post.tags if post else '' }}" placeholder="用逗号分隔多个标签">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="summary" class="form-label">摘要</label>
                        <textarea class="form-control" id="summary" name="summary" rows="2" 
                                  placeholder="文章摘要（可选，不填将自动截取正文前200字）">{{ post.summary if post else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label">文章内容 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="content" name="content" rows="15" 
                                  placeholder="支持 Markdown 格式" required>{{ post.content if post else '' }}</textarea>
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="is_published" name="is_published" 
                                   {{ 'checked' if not post or post.is_published else '' }}>
                            <label class="form-check-label" for="is_published">
                                立即发布
                            </label>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>返回
                        </a>
                        <div>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg me-2"></i>
                                {{ '保存修改' if post else '发布文章' }}
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
